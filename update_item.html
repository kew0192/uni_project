<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/create_diet.css">
    <title>Fit it</title>
</head>
<body class="background_create">
    <div class="left_column" id="left_column">
        <img src="images/logo.jpg" alt="Логотип Fit it" class="profile">
        <button class="first_link" id="first_link">Профиль</button>
    </div>
    <div class="box-create">
        <h1 class="text text--one">Редактирование</h1>
        <input type="text" class="input input--one" maxlength="20" id="Name" placeholder="Название...">
        <textarea class="textarea textarea--two" maxlength="84"  id="Description" placeholder="Описание..."></textarea>
        <textarea class="textarea textarea--three" id="Main" placeholder="Основная часть..."></textarea>
        <textarea class="textarea textarea--four" id="Results" placeholder="Итоги..."></textarea>
        <button class="button" id="go_to_next_stage">Применить</button>
    </div>
    <script src="js_scripts/update_item.js"></script>
</body>
</html>
